name: Supabase Migrate

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate.yml'

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply migrations via Supabase API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          API="https://api.supabase.com/v1/projects/ajddsbcbrgvwdbmqtfiw/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          api_query() {
            curl -sf -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$1" '{query: $q}')"
          }

          # Tạo bảng tracking nếu chưa có
          api_query "create schema if not exists supabase_migrations;
            create table if not exists supabase_migrations.schema_migrations (
              version text primary key,
              inserted_at timestamptz not null default now()
            );" > /dev/null

          # Bootstrap: đánh dấu các migration đã apply thủ công trước đó
          api_query "insert into supabase_migrations.schema_migrations (version) values
            ('20240101000000_schema.sql'),
            ('20240101000001_seed.sql'),
            ('20260415000000_view_count_and_storage.sql')
            on conflict (version) do nothing;" > /dev/null

          # Lấy danh sách migrations đã apply
          applied=$(api_query "select version from supabase_migrations.schema_migrations;" \
            | jq -r '.[].version // empty')

          # Apply từng file theo thứ tự
          for f in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$f")
            if printf '%s\n' "$applied" | grep -qxF "$version"; then
              echo "Skip (already applied): $version"
              continue
            fi

            echo "Applying: $version"
            http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --rawfile q "$f" '{query: $q}')")

            if [ "$http_code" != "200" ]; then
              echo "FAILED ($http_code):"
              cat /tmp/resp.json
              exit 1
            fi

            api_query "insert into supabase_migrations.schema_migrations (version) values ('$version');" > /dev/null
            echo "Applied: $version"
          done
          echo "All migrations done."
